<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>월급술사 온보딩</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/sun-typeface/SUIT@2/fonts/static/woff2/SUIT.css"/>
<link rel="stylesheet" href="tokens.css"/>
<style>
  :root{
    --primary:#5F79FF;
    --primary-soft:#BFC9FF;
    --teal:#5DD3C9;
    --lime:#C4E427;
    --bg:#FFFFFF;
    --ink:#000000;
    --muted:#545454;
    --muted-2:#757575;
    --line:#E4E4E4;
    --line-2:#D8D8D8;
    --chip:#353535;
    --soft:#F1F1F1;
    --bg-tinted:#EDEFF7;
    --sheet:#FFFFFF;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:#0F1116;height:100%;font-family:"SUIT",-apple-system,BlinkMacSystemFont,"Pretendard",system-ui,sans-serif;color:var(--ink);letter-spacing:-0.025em}
  body{display:flex;align-items:center;justify-content:center;overflow:hidden;min-height:100vh}
  #app{display:flex;align-items:center;justify-content:center;width:100%;height:100vh}
  button{font:inherit;color:inherit;background:none;border:0;cursor:pointer;padding:0}
  /* viewport scaler — keeps iPhone bezel centered */
  .stage{transform-origin:center center}

  /* shared utilities */
  .ksuit{font-family:"SUIT","Pretendard",system-ui,sans-serif}
  .pulse-dot{animation:pulse 1.4s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}
  .spin{animation:spin 1.2s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .float{animation:float 3.2s ease-in-out infinite}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
  .float-slow{animation:float 4.6s ease-in-out infinite}
  .twinkle{animation:twinkle 2.4s ease-in-out infinite}
  @keyframes twinkle{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}
  .fadein{animation:fadein .35s ease both}
  @keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .pop{animation:pop .42s cubic-bezier(.34,1.56,.64,1) both}
  @keyframes pop{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
  .slide-r{animation:slide-r .4s cubic-bezier(.22,.8,.4,1) both}
  @keyframes slide-r{from{opacity:0;transform:translateX(28px)}to{opacity:1;transform:translateX(0)}}
  .slide-l{animation:slide-l .4s cubic-bezier(.22,.8,.4,1) both}
  @keyframes slide-l{from{opacity:0;transform:translateX(-28px)}to{opacity:1;transform:translateX(0)}}
  .scrolly{overflow-y:auto;-webkit-overflow-scrolling:touch}
  .scrolly::-webkit-scrollbar{display:none}
  .nodrag{user-select:none;-webkit-user-drag:none}

  /* sparkle bg for cards */
  .sparkle::before{
    content:'';position:absolute;inset:0;border-radius:inherit;pointer-events:none;
    background:
      radial-gradient(circle at 18% 22%, rgba(255,255,255,.7) 0 1.2px, transparent 1.6px),
      radial-gradient(circle at 78% 18%, rgba(255,255,255,.5) 0 .9px, transparent 1.3px),
      radial-gradient(circle at 30% 80%, rgba(255,255,255,.5) 0 1px, transparent 1.4px),
      radial-gradient(circle at 86% 70%, rgba(255,255,255,.6) 0 .8px, transparent 1.2px),
      radial-gradient(circle at 60% 40%, rgba(255,255,255,.45) 0 .8px, transparent 1.2px);
  }

  /* pressable */
  .press{transition:transform .15s ease, box-shadow .15s ease, background-color .15s ease}
  .press:active{transform:scale(.97)}

  /* number ticker */
  .ticker{font-variant-numeric:tabular-nums}
</style>
</head>
<body>
<div id="app"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="screens-a.jsx"></script>
<script type="text/babel" src="screens-b.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
